<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,check,delete,edit" />
</head>

<body>

  <div class="todo-container">
    <h1>My Tasks</h1>
    <div class="input-group">
      <input id="taskInput" placeholder="What should we add" />
      <button id="addButton" title="Add Task"><span class="material-symbols-outlined">add</span></button>
    </div>
    <ul id="tasksList"></ul>
  </div>

  <script src="app.js"></script>
</body>

</html>
